name: CI — ATI Proteomics Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint + Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8

      - name: Lint with flake8
        run: |
          # Fail on syntax errors or undefined names; warn on style
          flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src/ tests/ --count --exit-zero --max-line-length=100 --statistics

      - name: Run unit tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=src --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml

  pipeline-smoke:
    name: Pipeline smoke test (synthetic data)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run train.py (synthetic cohort)
        run: python3 src/train.py

      - name: Run figures.py
        run: python3 src/figures.py

      - name: Run annotate.py
        run: python3 src/annotate.py

      - name: Verify required artifacts exist
        run: |
          python3 - <<'EOF'
          import os, sys
          required = [
            "artifacts/column_manifest.json",
            "artifacts/cv_results.json",
            "artifacts/calibration_metrics.json",
            "artifacts/feature_importance.csv",
            "artifacts/arm_comparison.csv",
            "artifacts/protein_annotation.csv",
            "artifacts/tables/table2_performance.csv",
            "artifacts/figures/fig1_calibration.png",
            "artifacts/figures/fig2_importance.png",
            "artifacts/figures/fig3_pathways.png",
            "data/processed/kpmp_clean.csv",
            "governance/run_manifest.json",
          ]
          missing = [f for f in required if not os.path.exists(f)]
          if missing:
            print("MISSING ARTIFACTS:")
            for m in missing:
              print(f"  {m}")
            sys.exit(1)
          print(f"All {len(required)} required artifacts present.")
          EOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-outputs
          path: |
            artifacts/
            governance/run_manifest.json
